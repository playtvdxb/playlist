name: Update Live Playlist

on:
  schedule:
    - cron: "0 */6 * * *"  # Updates every 6 hours
  workflow_dispatch:  # Manual trigger button

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install urllib3
    
    - name: Run playlist generator
      run: python yuppfast.py
    
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add yupptvfast.m3u
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update playlist [skip ci]"
        git push
