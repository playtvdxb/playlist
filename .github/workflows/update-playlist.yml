name: Update Live Playlist

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        pip install urllib3
    - name: Run script
      run: python scripts/yuppfast.py  # <-- Make sure this path is correct
    - name: Commit and push
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add yupptvfast.m3u
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update playlist [skip ci]"
        git push
